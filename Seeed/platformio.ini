[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.partitions = default_8MB.csv
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DMQTT_MAX_PACKET_SIZE=2048
    ; Seeed_GFX's own TFT_eSPI.cpp compiles without our include/ dir on its
    ; path (PlatformIO scopes library builds separately), so driver.h's
    ; __has_include("driver.h") never fires there and EPaper's member
    ; functions silently never get built into the library — global build
    ; flags are the only thing every translation unit (ours + the library's)
    ; is guaranteed to see.
    -DBOARD_SCREEN_COMBO=510
    -DUSE_XIAO_EPAPER_DISPLAY_BOARD_EE02
lib_deps =
    leamhein/Seeed_GFX@^2.0.3
    bblanchon/ArduinoJson@^7.1
    h2zero/NimBLE-Arduino@^1.4
; MQTT uses ESP-IDF esp-mqtt (mqtt_client.h) — no PubSubClient.
